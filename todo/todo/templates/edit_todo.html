{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Todo</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap"/>
    <link rel="stylesheet" href="{% static 'css/edit.css' %}"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
</head>
<body>
<div class="signup-login">
    <h1>Hello {{ user.username }}</h1>
    <div class="signup-box">
        <div class="heading">Edit your task</div>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="title" value="{{ obj.title }}" required>
            <input type="submit" value="Update Task">
        </form>
    </div>

    <div class="task-list">
        {% for task in tasks %}
        <div class="Todo">
            <h5>{{ task.srno }}</h5>
            <p>{{ task.title }}</p>
            <div>
                <a href="{% url 'edit_todo' task.srno %}"><i class="fa-solid fa-pen-to-square"></i></a>
                <a href="{% url 'delete' task.srno %}"><i class="fa-solid fa-trash"></i></a>
                <a href="{% url 'complete' task.srno %}"><i class="fa-solid fa-check"></i></a>
            </div>
        </div>
        {% empty %}
            <p>No tasks yet.</p>
        {% endfor %}
    </div>
</div>
</body>
</html>
